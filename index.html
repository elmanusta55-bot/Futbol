<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol.Az | Canlı Nəticələr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .live-pulse { position: relative; }
        .live-pulse::after { content: ''; position: absolute; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; left: -12px; top: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

    <header class="glass sticky top-0 z-50 border-b border-white/5">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-emerald-500 italic">FUTBOL<span class="text-white">.AZ</span></h1>
            <div class="space-x-6 hidden md:flex text-sm font-bold uppercase tracking-widest">
                <a href="#" class="text-emerald-500">Canlı</a>
                <a href="#" class="hover:text-emerald-500">Turnirlər</a>
                <a href="#" class="hover:text-emerald-500">Xəbərlər</a>
            </div>
            <button class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-lg text-sm font-bold transition">Giriş</button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold live-pulse ml-4 uppercase">Canlı Qarşılaşmalar</h2>
                    <span id="update-time" class="text-xs text-slate-500">Yenilənir...</span>
                </div>

                <div id="live-matches-container" class="space-y-4">
                    <div class="glass p-8 rounded-2xl text-center text-slate-500 animate-pulse">
                        Məlumatlar proxy vasitəsilə gətirilir...
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass rounded-3xl p-6 border border-emerald-500/20">
                    <h3 class="font-bold text-lg mb-6 border-b border-white/5 pb-4 italic">MİSLİ PREMYER LİQASI</h3>
                    <div class="space-y-4 text-sm">
                        <div class="flex justify-between items-center p-2 hover:bg-white/5 rounded-lg transition">
                            <span class="font-bold w-8 text-emerald-500">1</span>
                            <span class="flex-1 font-semibold text-slate-200">Qarabağ</span>
                            <span class="font-bold px-3 py-1 bg-emerald-500/10 text-emerald-500 rounded">58</span>
                        </div>
                        <div class="flex justify-between items-center p-2 hover:bg-white/5 rounded-lg transition">
                            <span class="font-bold w-8 text-slate-500">2</span>
                            <span class="flex-1 font-semibold text-slate-300">Sabah</span>
                            <span class="font-bold px-3 py-1 bg-white/5 text-slate-400 rounded">42</span>
                        </div>
                        <div class="flex justify-between items-center p-2 hover:bg-white/5 rounded-lg transition">
                            <span class="font-bold w-8 text-slate-500">3</span>
                            <span class="flex-1 font-semibold text-slate-300">Zirə</span>
                            <span class="font-bold px-3 py-1 bg-white/5 text-slate-400 rounded">40</span>
                        </div>
                        <div class="flex justify-between items-center p-2 hover:bg-white/5 rounded-lg transition">
                            <span class="font-bold w-8 text-slate-500">4</span>
                            <span class="flex-1 font-semibold text-slate-300">Neftçi</span>
                            <span class="font-bold px-3 py-1 bg-white/5 text-slate-400 rounded">36</span>
                        </div>
                    </div>
                    <button class="w-full mt-6 py-3 text-xs font-bold text-slate-400 hover:text-white border border-white/5 rounded-xl transition">TAM CƏDVƏLƏ BAX</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Canlı Məlumatlar üçün Proxy Funksiyası
        async function fetchLiveScores() {
            const container = document.getElementById('live-matches-container');
            const timeEl = document.getElementById('update-time');
            
            // AllOrigins Proxy istifadə edərək CORS maneəsini aşırıq
            const apiUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.api-football.com/v3/fixtures?live=all');

            try {
                // QEYD: Real API Key olsa daha yaxşı olar, amma indi "Fallback" (Ehtiyat) data ilə işlədəcəyik
                const mockData = [
                    { home: "Qarabağ", away: "Sabah", score: "2 - 1", time: "65'", league: "Azərbaycan" },
                    { home: "Galatasaray", away: "Fenerbahçe", score: "0 - 0", time: "22'", league: "Türkiyə" },
                    { home: "Real Madrid", away: "Barcelona", score: "3 - 2", time: "88'", league: "İspaniya" }
                ];

                container.innerHTML = ''; // Köhnəni təmizlə
                
                mockData.forEach(match => {
                    container.innerHTML += `
                        <div class="glass p-5 rounded-2xl hover:border-emerald-500/30 transition cursor-pointer group">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">${match.league}</span>
                                <span class="text-xs font-bold text-red-500 bg-red-500/10 px-2 py-1 rounded">${match.time}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex-1 text-right font-bold text-lg">${match.home}</div>
                                <div class="px-6 text-2xl font-black text-emerald-500">${match.score}</div>
                                <div class="flex-1 text-left font-bold text-lg">${match.away}</div>
                            </div>
                        </div>
                    `;
                });

                const now = new Date();
                timeEl.innerText = "Son yenilənmə: " + now.getHours() + ":" + now.getMinutes();

            } catch (error) {
                console.error("Proxy xətası:", error);
                container.innerHTML = '<div class="glass p-6 text-red-400 text-center">Məlumat gətirilərkən xəta baş verdi.</div>';
            }
        }

        // Sayt açılanda və hər 60 saniyədən bir yenilə
        fetchLiveScores();
        setInterval(fetchLiveScores, 60000);
    </script>
</body>
</html>
